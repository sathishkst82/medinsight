name: terraform-destroy-plan

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true

jobs:
  destroy-plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
        working-directory: environments/${{ inputs.environment == 'DEV' && 'dev' || inputs.environment == 'UAT' && 'uat' || 'prod' }}

      - run: terraform plan -destroy -out=tfdestroy
        working-directory: environments/${{ inputs.environment == 'DEV' && 'dev' || inputs.environment == 'UAT' && 'uat' || 'prod' }}

      - uses: actions/upload-artifact@v4
        with:
          name: tfdestroy-${{ inputs.environment }}
          path: environments/**/tfdestroy
