name: terraform-destroy-plan

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true

jobs:
  destroy-plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Set environment path
        id: env-path
        run: |
          case "${{ inputs.environment }}" in
            DEV) echo "path=dev" >> $GITHUB_OUTPUT ;;
            UAT) echo "path=uat" >> $GITHUB_OUTPUT ;;
            *) echo "path=prod" >> $GITHUB_OUTPUT ;;
          esac

      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ secrets.TF_BACKEND_KEY }}"
        working-directory: environments/${{ steps.env-path.outputs.path }}

      - run: terraform plan -destroy -out=tfdestroy
        working-directory: environments/${{ steps.env-path.outputs.path }}

      - uses: actions/upload-artifact@v4
        with:
          name: tfdestroy-${{ inputs.environment }}
          path: environments/${{ steps.env-path.outputs.path }}/tfdestroy
